<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Baltigo | Leitor de Mangas</title>
  <meta name="theme-color" content="#131416" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #101112;
      --bg-soft: #17191c;
      --panel: rgba(28, 31, 36, 0.9);
      --panel-strong: rgba(36, 40, 46, 0.96);
      --panel-muted: rgba(255, 255, 255, 0.035);
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --text: #f4f6fb;
      --text-soft: #c8cfdd;
      --text-muted: #8d95a7;
      --brand: #a8c4ff;
      --brand-strong: #8fb2ff;
      --brand-panel: rgba(168, 196, 255, 0.16);
      --accent: #f55b5b;
      --accent-soft: rgba(245, 91, 91, 0.14);
      --success: #79d3a6;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      --shadow-soft: 0 12px 32px rgba(0, 0, 0, 0.22);
      --radius-xs: 10px;
      --radius-sm: 16px;
      --radius-md: 22px;
      --radius-lg: 28px;
      --header-h: 74px;
      --nav-h: 86px;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --max-w: 1220px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100dvh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(168, 196, 255, 0.1), transparent 30%),
        radial-gradient(circle at bottom right, rgba(245, 91, 91, 0.08), transparent 32%),
        linear-gradient(180deg, #141517 0%, #0f1011 100%);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button,
    input {
      border: 0;
      outline: 0;
      background: none;
      color: inherit;
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      height: calc(var(--header-h) + var(--safe-t));
      padding-top: var(--safe-t);
      background: linear-gradient(180deg, rgba(16, 17, 18, 0.96), rgba(16, 17, 18, 0.82));
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .header-inner {
      width: min(100%, var(--max-w));
      height: var(--header-h);
      margin: 0 auto;
      padding: 0 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .header-copy {
      min-width: 0;
      text-align: center;
    }

    .header-kicker {
      display: block;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header-title {
      font-family: "Outfit", sans-serif;
      font-size: clamp(1.7rem, 4vw, 2.3rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .header-actions,
    .header-leading {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 74px;
    }

    .header-leading {
      justify-content: flex-start;
    }

    .header-actions {
      justify-content: flex-end;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-soft);
      transition: transform 0.16s var(--ease), background 0.18s var(--ease), color 0.18s var(--ease);
      flex-shrink: 0;
    }

    .icon-button:hover {
      background: rgba(255, 255, 255, 0.09);
      color: var(--text);
    }

    .icon-button.active {
      background: rgba(245, 91, 91, 0.16);
      color: #ffd8d8;
      border-color: rgba(245, 91, 91, 0.34);
    }

    .icon-button:active {
      transform: scale(0.92);
    }

    .page {
      width: 100%;
      min-height: 100dvh;
      padding:
        calc(var(--header-h) + var(--safe-t) + 20px)
        16px
        calc(var(--nav-h) + var(--safe-b) + 26px);
      animation: fade-up 0.26s var(--ease);
    }

    .page.reader-page,
    .page.detail-page {
      padding: 0;
    }

    .section-block {
      margin-bottom: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 0;
    }

    .section-title-wrap {
      min-width: 0;
    }

    .section-title {
      font-family: "Outfit", sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .section-subtitle {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .section-body {
      padding: 18px;
    }

    .pill-button,
    .ghost-button,
    .solid-button {
      min-height: 42px;
      border-radius: 999px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      transition: transform 0.16s var(--ease), background 0.18s var(--ease), border-color 0.18s var(--ease);
    }

    .pill-button,
    .ghost-button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--text-soft);
    }

    .solid-button {
      background: linear-gradient(135deg, var(--brand-strong), #d9e3ff);
      color: #101215;
      box-shadow: 0 16px 38px rgba(168, 196, 255, 0.28);
    }

    .solid-button.active {
      background: linear-gradient(135deg, #ffc6c6, #ffe0e0);
      color: #251617;
      box-shadow: 0 16px 38px rgba(245, 91, 91, 0.18);
    }

    .pill-button:hover,
    .ghost-button:hover,
    .solid-button:hover {
      transform: translateY(-1px);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 240px;
      background: #181b1f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(10, 11, 12, 0.12) 0%, rgba(10, 11, 12, 0.88) 100%),
        radial-gradient(circle at top right, rgba(168, 196, 255, 0.26), transparent 34%);
      z-index: 1;
    }

    .hero-cover {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(1.02);
      filter: saturate(1.04);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      min-height: 240px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 14px;
    }

    .hero-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .hero-title {
      font-family: "Outfit", sans-serif;
      font-size: clamp(1.8rem, 6vw, 3.4rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
      max-width: 10ch;
      text-wrap: balance;
    }

    .hero-copy {
      max-width: 36rem;
      color: rgba(244, 246, 251, 0.82);
      line-height: 1.55;
      font-size: 0.98rem;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stats-pill {
      padding: 14px 12px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    .stats-value {
      font-family: "Outfit", sans-serif;
      font-size: 1.28rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .stats-label {
      margin-top: 4px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .poster-card {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      min-height: 260px;
      background: #1b1e24;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s var(--ease), border-color 0.2s var(--ease);
    }

    .poster-card:hover {
      transform: translateY(-3px);
      border-color: rgba(168, 196, 255, 0.25);
    }

    .poster-thumb {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(6, 8, 10, 0.06) 28%, rgba(6, 8, 10, 0.88) 100%),
        #20242a;
    }

    .poster-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .poster-badge,
    .poster-progress,
    .poster-heart {
      position: absolute;
      z-index: 2;
    }

    .poster-badge {
      top: 12px;
      left: 12px;
      min-width: 42px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(207, 220, 255, 0.92);
      color: #16181c;
      font-family: "Outfit", sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    .poster-heart {
      top: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(10, 12, 14, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .poster-heart.active {
      background: rgba(245, 91, 91, 0.2);
      color: #ffd1d1;
      border-color: rgba(245, 91, 91, 0.44);
    }

    .poster-progress {
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
    }

    .poster-progress > span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--brand-strong), #f1f6ff);
    }

    .poster-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .poster-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.24;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      text-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .poster-meta {
      color: rgba(244, 246, 251, 0.72);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .rail {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .rail::-webkit-scrollbar {
      display: none;
    }

    .mini-card {
      flex: 0 0 150px;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .mini-thumb {
      aspect-ratio: 2 / 3;
      background: #1f2328;
      position: relative;
    }

    .mini-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mini-copy {
      padding: 12px;
    }

    .mini-title {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.28;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .mini-subtitle {
      margin-top: 5px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .search-shell {
      display: grid;
      gap: 14px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .search-box svg {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .search-box input {
      flex: 1;
      min-width: 0;
      font-size: 0.98rem;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-soft);
      font-size: 0.88rem;
      font-weight: 700;
      transition: background 0.18s var(--ease), color 0.18s var(--ease), border-color 0.18s var(--ease);
    }

    .chip.active {
      background: var(--brand-panel);
      border-color: rgba(168, 196, 255, 0.34);
      color: var(--brand);
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .list-card {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow-soft);
    }

    .list-thumb {
      width: 76px;
      height: 98px;
      border-radius: 18px;
      overflow: hidden;
      background: #1f2328;
    }

    .list-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .list-main {
      min-width: 0;
    }

    .list-title {
      font-family: "Outfit", sans-serif;
      font-size: 1.06rem;
      font-weight: 600;
      line-height: 1.18;
      letter-spacing: -0.03em;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .list-line {
      margin-top: 7px;
      color: var(--text-soft);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .list-meta {
      margin-top: 7px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    .meta-pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.08);
      white-space: nowrap;
    }

    .list-action {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(168, 196, 255, 0.12);
      color: var(--brand);
      font-size: 0.88rem;
      font-weight: 700;
      border: 1px solid rgba(168, 196, 255, 0.22);
    }

    .profile-hero {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      background:
        radial-gradient(circle at top right, rgba(168, 196, 255, 0.18), transparent 35%),
        linear-gradient(145deg, rgba(36, 40, 46, 0.96), rgba(23, 25, 28, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 22px;
    }

    .profile-head {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .profile-avatar {
      width: 88px;
      height: 88px;
      border-radius: 30px;
      overflow: hidden;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(168, 196, 255, 0.22), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-family: "Outfit", sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.05em;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-name {
      font-family: "Outfit", sans-serif;
      font-size: clamp(1.7rem, 5vw, 2.2rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .profile-handle {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .profile-note {
      margin-top: 16px;
      color: rgba(244, 246, 251, 0.8);
      line-height: 1.6;
      max-width: 34rem;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat-card .stats-value {
      font-size: 1.62rem;
    }

    .detail-screen {
      position: relative;
      min-height: 100dvh;
      background: #101112;
      overflow: hidden;
    }

    .detail-backdrop {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(0) saturate(1.06);
      transform: scale(1.03);
      opacity: 0.34;
    }

    .detail-backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(10, 12, 14, 0.28) 0%, rgba(10, 12, 14, 0.9) 48%, #101112 100%),
        radial-gradient(circle at top right, rgba(168, 196, 255, 0.22), transparent 26%);
    }

    .detail-content {
      position: relative;
      z-index: 2;
      padding: calc(var(--safe-t) + 22px) 18px calc(26px + var(--safe-b));
      max-width: 980px;
      margin: 0 auto;
    }

    .detail-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .detail-hero {
      display: grid;
      gap: 18px;
      align-items: end;
      margin-bottom: 24px;
    }

    .detail-cover {
      width: 150px;
      height: 214px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--shadow);
      background: #1e2228;
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-copy {
      display: grid;
      gap: 10px;
    }

    .detail-kicker {
      color: var(--brand);
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .detail-title {
      font-family: "Outfit", sans-serif;
      font-size: clamp(2rem, 7vw, 3.6rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
      text-wrap: balance;
    }

    .detail-authors {
      color: var(--text-soft);
      font-size: 1rem;
    }

    .detail-description {
      color: rgba(244, 246, 251, 0.78);
      line-height: 1.72;
      font-size: 0.98rem;
    }

    .detail-panel {
      padding: 18px;
      border-radius: 24px;
      background: rgba(22, 25, 30, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow-soft);
      margin-bottom: 18px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .genre-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .genre-pill {
      padding: 12px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-soft);
      font-weight: 700;
      white-space: nowrap;
    }

    .chapter-tools {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .chapter-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .chapter-item {
      width: 100%;
      padding: 16px 18px;
      border-radius: 20px;
      text-align: left;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      transition: transform 0.16s var(--ease), background 0.18s var(--ease);
    }

    .chapter-item:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.065);
    }

    .chapter-item.current {
      border-color: rgba(168, 196, 255, 0.32);
      background: rgba(168, 196, 255, 0.11);
    }

    .chapter-item.read .chapter-info-line:last-child {
      color: rgba(121, 211, 166, 0.92);
    }

    .chapter-info {
      min-width: 0;
    }

    .chapter-info-line {
      display: block;
      line-height: 1.4;
    }

    .chapter-info-line:first-child {
      font-weight: 800;
      color: var(--text);
    }

    .chapter-info-line:last-child {
      color: var(--text-muted);
      font-size: 0.86rem;
    }

    .reader-shell {
      min-height: 100dvh;
      padding: calc(var(--safe-t) + 18px) 12px calc(24px + var(--safe-b));
      background: #101112;
    }

    .reader-toolbar,
    .reader-end {
      max-width: 860px;
      margin: 0 auto 14px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(22, 25, 30, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .reader-copy {
      min-width: 0;
    }

    .reader-title {
      font-family: "Outfit", sans-serif;
      font-size: 1.14rem;
      line-height: 1.06;
    }

    .reader-subtitle {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 0.84rem;
    }

    .reader-pages {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .reader-page-card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: #181c21;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .reader-page-card img {
      width: 100%;
      height: auto;
    }

    .page-counter {
      position: absolute;
      right: 10px;
      bottom: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(10, 12, 14, 0.74);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.78rem;
      font-weight: 700;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .empty-state {
      padding: 28px 22px;
      border-radius: 24px;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.03);
      text-align: center;
    }

    .empty-title {
      font-family: "Outfit", sans-serif;
      font-size: 1.18rem;
      letter-spacing: -0.04em;
    }

    .empty-text {
      margin-top: 8px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: calc(14px + var(--safe-b));
      transform: translateX(-50%);
      z-index: 45;
      width: min(calc(100vw - 20px), 820px);
      padding: 10px;
      border-radius: 30px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      background: rgba(20, 22, 25, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
    }

    .nav-item {
      position: relative;
      min-height: 62px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      flex-direction: column;
      color: rgba(244, 246, 251, 0.86);
      transition: background 0.18s var(--ease), color 0.18s var(--ease), transform 0.16s var(--ease);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .nav-item.active {
      background: rgba(168, 196, 255, 0.16);
      color: var(--brand);
    }

    .nav-item:active {
      transform: scale(0.96);
    }

    .nav-badge {
      position: absolute;
      top: 8px;
      right: 24px;
      min-width: 19px;
      height: 19px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 0.72rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(245, 91, 91, 0.28);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      background: rgba(7, 9, 12, 0.54);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .loading-card {
      width: min(92vw, 320px);
      padding: 24px 22px;
      border-radius: 28px;
      background: rgba(22, 25, 30, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .loading-orb {
      width: 56px;
      height: 56px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 4px solid rgba(168, 196, 255, 0.18);
      border-top-color: var(--brand);
      animation: spin 0.85s linear infinite;
    }

    .loading-title {
      font-family: "Outfit", sans-serif;
      font-size: 1.2rem;
      letter-spacing: -0.04em;
    }

    .loading-text {
      margin-top: 7px;
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--nav-h) + var(--safe-b) + 18px);
      transform: translateX(-50%) translateY(12px);
      z-index: 62;
      width: min(calc(100vw - 28px), 440px);
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(20, 22, 25, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
      color: var(--text-soft);
      box-shadow: var(--shadow-soft);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s var(--ease), transform 0.18s var(--ease);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 720px) {
      .page {
        padding-left: 22px;
        padding-right: 22px;
      }

      .collection-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .detail-hero {
        grid-template-columns: 180px minmax(0, 1fr);
        gap: 24px;
      }

      .detail-cover {
        width: 180px;
        height: 256px;
      }

      .stat-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stats-strip {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (min-width: 980px) {
      .collection-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .header-inner {
        padding: 0 14px;
      }

      .icon-button {
        width: 38px;
        height: 38px;
        border-radius: 12px;
      }

      .page {
        padding-left: 14px;
        padding-right: 14px;
      }

      .hero-card {
        min-height: 216px;
      }

      .hero-content {
        min-height: 216px;
        padding: 18px;
      }

      .stats-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .list-card {
        grid-template-columns: 68px minmax(0, 1fr);
      }

      .list-action {
        grid-column: 1 / -1;
        width: 100%;
        justify-content: center;
      }

      .nav-item {
        min-height: 58px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header" id="appHeader">
      <div class="header-inner">
        <div class="header-leading">
          <button class="icon-button hidden" id="backBtn" aria-label="Voltar"></button>
        </div>
        <div class="header-copy">
          <span class="header-kicker" id="headerKicker">Sua coleção</span>
          <h1 class="header-title" id="headerTitle">Biblioteca</h1>
        </div>
        <div class="header-actions">
          <button class="icon-button hidden" id="headerActionSecondary" aria-label="Ação secundária"></button>
          <button class="icon-button hidden" id="headerActionPrimary" aria-label="Ação principal"></button>
        </div>
      </div>
    </header>

    <main id="libraryPage" class="page"></main>
    <main id="updatesPage" class="page hidden"></main>
    <main id="explorePage" class="page hidden"></main>
    <main id="historyPage" class="page hidden"></main>
    <main id="profilePage" class="page hidden"></main>
    <main id="detailPage" class="page detail-page hidden"></main>
    <main id="readerPage" class="page reader-page hidden"></main>

    <nav class="bottom-nav" id="bottomNav" aria-label="Navegação principal">
      <button class="nav-item active" data-page="library">
        <span class="nav-icon" data-icon="books"></span>
        <span>Biblioteca</span>
      </button>
      <button class="nav-item" data-page="updates">
        <span class="nav-badge hidden" id="updatesBadge"></span>
        <span class="nav-icon" data-icon="bolt"></span>
        <span>Atualizações</span>
      </button>
      <button class="nav-item" data-page="explore">
        <span class="nav-icon" data-icon="compass"></span>
        <span>Explorar</span>
      </button>
      <button class="nav-item" data-page="history">
        <span class="nav-icon" data-icon="history"></span>
        <span>Histórico</span>
      </button>
      <button class="nav-item" data-page="profile">
        <span class="nav-icon" data-icon="user"></span>
        <span>Perfil</span>
      </button>
    </nav>

    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="loading-card">
        <div class="loading-orb"></div>
        <div class="loading-title" id="loadingTitle">Preparando sua biblioteca</div>
        <div class="loading-text" id="loadingText">Buscando favoritos, capítulos e capas para o seu miniapp.</div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();
    tg?.setBackgroundColor?.("#101112");
    tg?.setHeaderColor?.("#101112");

    const $$ = (id) => document.getElementById(id);
    const cssEscape = window.CSS?.escape
      ? window.CSS.escape.bind(window.CSS)
      : (value) => String(value).replace(/["\\]/g, "\\$&");

    const ICONS = {
      books: `
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H11v17H6.5A2.5 2.5 0 0 0 4 22V5.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M13 3h4.5A2.5 2.5 0 0 1 20 5.5V22a2.5 2.5 0 0 0-2.5-2H13V3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M7 7h1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      `,
      bolt: `
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m13 2-8 11h5l-1 9 8-11h-5l1-9Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      `,
      compass: `
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
          <path d="m14.6 9.4-4.2 1.4-1.4 4.2 4.2-1.4 1.4-4.2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      `,
      history: `
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 3-6.708" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M3 4v4h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `,
      user: `
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M19 21a7 7 0 0 0-14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
        </svg>
      `,
      back: `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `,
      search: `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      `,
      refresh: `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M21 3v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `,
      heart: `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 21s-7.05-4.35-9.42-8.2C.1 9.04 1.05 4.7 5.48 3.55c2.32-.61 4.34.5 5.52 2.09 1.18-1.59 3.2-2.7 5.52-2.09 4.43 1.15 5.38 5.49 2.9 9.25C19.05 16.65 12 21 12 21Z"/>
        </svg>
      `,
      more: `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <circle cx="12" cy="5" r="2"></circle>
          <circle cx="12" cy="12" r="2"></circle>
          <circle cx="12" cy="19" r="2"></circle>
        </svg>
      `,
      play: `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M8 5v14l11-7-11-7Z"></path>
        </svg>
      `,
    };

    document.querySelectorAll("[data-icon]").forEach((node) => {
      node.innerHTML = ICONS[node.dataset.icon] || "";
    });
    $$("backBtn").innerHTML = ICONS.back;

    const TAB_PAGES = new Set(["library", "updates", "explore", "history", "profile"]);
    const PAGES = {
      library: $$("libraryPage"),
      updates: $$("updatesPage"),
      explore: $$("explorePage"),
      history: $$("historyPage"),
      profile: $$("profilePage"),
      detail: $$("detailPage"),
      reader: $$("readerPage"),
    };

    const HEADER_META = {
      library: { kicker: "Sua coleção", title: "Biblioteca" },
      updates: { kicker: "Favoritos primeiro", title: "Atualizações" },
      explore: { kicker: "Catálogo em PT-BR", title: "Explorar" },
      history: { kicker: "Últimos lidos", title: "Histórico" },
      profile: { kicker: "Seu resumo", title: "Perfil" },
    };

    const state = {
      user: tg?.initDataUnsafe?.user || null,
      userId: String(tg?.initDataUnsafe?.user?.id || ""),
      currentPage: "library",
      lastTab: "library",
      currentTitleId: "",
      currentChapterId: "",
      currentTitleBundle: null,
      chapterObserver: null,
      loadingLock: 0,
      favorites: loadFavorites(),
      localProgress: loadLocalProgress(),
      cache: {
        home: null,
        explore: null,
        recentChapters: null,
        history: null,
        titles: new Map(),
        chapters: new Map(),
        search: new Map(),
      },
      inflight: {
        titles: new Map(),
        chapters: new Map(),
        search: new Map(),
      },
      exploreQuery: "",
      exploreFilter: "all",
      exploreResults: [],
      exploreSearching: false,
      chapterOrder: "desc",
      chapterFilter: "",
    };

    function esc(value = "") {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function stripHtml(value = "") {
      const box = document.createElement("div");
      box.innerHTML = String(value || "");
      return box.textContent || box.innerText || "";
    }

    function showLoading(title = "Carregando", text = "Aguarde um instante.") {
      state.loadingLock += 1;
      $$("loadingTitle").textContent = title;
      $$("loadingText").textContent = text;
      $$("loadingOverlay").classList.remove("hidden");
    }

    function hideLoading() {
      state.loadingLock = Math.max(0, state.loadingLock - 1);
      if (state.loadingLock === 0) {
        $$("loadingOverlay").classList.add("hidden");
      }
    }

    let toastTimer;
    function toast(message) {
      const node = $$("toast");
      node.textContent = message || "";
      node.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => node.classList.remove("show"), 2600);
    }

    function emptyState(title, text) {
      return `
        <div class="empty-state">
          <div class="empty-title">${esc(title)}</div>
          <div class="empty-text">${esc(text)}</div>
        </div>
      `;
    }

    function parseDate(value) {
      if (!value && value !== 0) return null;
      if (value instanceof Date) return Number.isNaN(value.getTime()) ? null : value;
      if (typeof value === "number") {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      const text = String(value).trim();
      if (!text) return null;
      const direct = new Date(text);
      if (!Number.isNaN(direct.getTime())) return direct;
      const utc = new Date(text.replace(" ", "T") + "Z");
      return Number.isNaN(utc.getTime()) ? null : utc;
    }

    function formatTimeAgo(value) {
      const date = parseDate(value);
      if (!date) return "Agora";
      const diff = Date.now() - date.getTime();
      const minutes = Math.max(0, Math.round(diff / 60000));
      if (minutes < 1) return "Agora";
      if (minutes < 60) return `${minutes} min atrás`;
      const hours = Math.round(minutes / 60);
      if (hours < 24) return `${hours} h atrás`;
      const days = Math.round(hours / 24);
      if (days < 30) return `${days} dia${days > 1 ? "s" : ""} atrás`;
      const months = Math.round(days / 30);
      return `${months} mes${months > 1 ? "es" : ""} atrás`;
    }

    function chapterLabel(item = {}) {
      const number = item.chapter_number || item.latest_chapter || "";
      return number ? `Capítulo ${number}` : "Novo capítulo";
    }

    function titleLabel(item = {}) {
      return item.display_title || item.title || item.title_name || "Mangá";
    }

    function toTitleItem(item = {}) {
      return {
        title_id: String(item.title_id || item.id || "").trim(),
        title_name: item.title_name || item.title || item.display_title || "Mangá",
        title: titleLabel(item),
        display_title: titleLabel(item),
        cover_url: item.cover_url || item.background_url || "",
        background_url: item.background_url || item.cover_url || "",
        chapter_id: item.chapter_id || "",
        latest_chapter: item.latest_chapter || item.chapter_number || "",
        chapter_number: item.chapter_number || item.latest_chapter || "",
        status: item.status || "",
        rating: item.rating || item.anilist_score || "",
        updated_at: item.updated_at || item.added_at || "",
        adult: Boolean(item.adult || item.is_adult),
        page_index: Number(item.page_index || 0),
        total_pages: Number(item.total_pages || 0),
        added_at: Number(item.added_at || 0),
      };
    }

    function dedupeByTitle(items = []) {
      const seen = new Set();
      const output = [];
      items.forEach((item) => {
        const normalized = toTitleItem(item);
        if (!normalized.title_id || seen.has(normalized.title_id)) return;
        seen.add(normalized.title_id);
        output.push(normalized);
      });
      return output;
    }

    function loadFavorites() {
      try {
        return JSON.parse(localStorage.getItem("mb_favorites_v1") || "{}");
      } catch (_) {
        return {};
      }
    }

    function saveFavorites() {
      try {
        localStorage.setItem("mb_favorites_v1", JSON.stringify(state.favorites || {}));
      } catch (_) {}
    }

    function loadLocalProgress() {
      try {
        return JSON.parse(localStorage.getItem("mb_progress_v2") || "{}");
      } catch (_) {
        return {};
      }
    }

    function saveLocalProgress() {
      try {
        localStorage.setItem("mb_progress_v2", JSON.stringify(state.localProgress || {}));
      } catch (_) {}
    }

    function isFav(titleId) {
      return Boolean(state.favorites[String(titleId || "")]);
    }

    function getFavList() {
      return Object.values(state.favorites || {})
        .map(toTitleItem)
        .sort((a, b) => Number(b.added_at || 0) - Number(a.added_at || 0));
    }

    function setProgress(payload) {
      if (!payload?.title_id) return;
      state.localProgress[payload.title_id] = {
        ...state.localProgress[payload.title_id],
        ...payload,
        updated_at: Date.now(),
      };
      saveLocalProgress();
    }

    function getProgress(titleId) {
      return state.localProgress?.[String(titleId || "")] || null;
    }

    function getSortedProgressItems() {
      return Object.values(state.localProgress || {})
        .filter((item) => item.title_id)
        .sort((a, b) => Number(b.updated_at || 0) - Number(a.updated_at || 0));
    }

    function getLocalHistoryItems() {
      return getSortedProgressItems().map((item) => ({
        title_id: item.title_id,
        title: item.title_name || "Mangá",
        chapter_id: item.chapter_id || "",
        chapter_number: item.chapter_number || "",
        updated_at: item.updated_at || "",
        cover_url: item.cover_url || getFallbackCover(item.title_id),
        page_index: Number(item.page_index || 0),
        total_pages: Number(item.total_pages || 0),
      }));
    }

    function getFallbackCover(titleId) {
      const progress = getProgress(titleId);
      if (progress?.cover_url) return progress.cover_url;
      const favorite = state.favorites[String(titleId || "")];
      if (favorite?.cover_url) return favorite.cover_url;
      const cachedTitle = state.cache.titles.get(String(titleId || ""));
      if (cachedTitle?.cover_url) return cachedTitle.cover_url;
      const exploreItem = (state.cache.explore || []).find((item) => String(item.title_id) === String(titleId));
      return exploreItem?.cover_url || "";
    }

    function getUserName() {
      const user = state.user || {};
      const name = [user.first_name, user.last_name].filter(Boolean).join(" ").trim();
      return name || user.username || "Leitor Baltigo";
    }

    function getUserHandle() {
      const user = state.user || {};
      if (user.username) return `@${user.username}`;
      if (state.userId) return `ID ${state.userId}`;
      return "Perfil local";
    }

    function getUserPhoto() {
      return state.user?.photo_url || "";
    }

    function getUserInitials() {
      const parts = getUserName().split(/\s+/).filter(Boolean).slice(0, 2);
      if (!parts.length) return "MB";
      return parts.map((part) => part[0]).join("").toUpperCase();
    }

    function computeProfileStats(historyItems = []) {
      const favoritesCount = getFavList().length;
      const progressItems = getSortedProgressItems();
      const history = historyItems.length ? historyItems : getLocalHistoryItems();
      const worksRead = new Set(history.map((item) => item.title_id).filter(Boolean)).size;
      const chaptersRead = history.length;
      const trackedPages = progressItems.reduce((sum, item) => sum + Number(item.page_index || 0), 0);
      const ongoing = progressItems.filter((item) => item.chapter_id).length;
      return { favoritesCount, worksRead, chaptersRead, trackedPages, ongoing };
    }

    async function api(path, options = {}) {
      const response = await fetch(path, { ...options, credentials: "same-origin" });
      if (!response.ok) {
        let message = `HTTP ${response.status}`;
        try {
          const payload = await response.json();
          message = payload?.detail || payload?.message || message;
        } catch (_) {}
        throw new Error(message);
      }
      return response.json();
    }

    function getBootParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        route: params.get("route") || "",
        titleId: params.get("title_id") || "",
        chapterId: params.get("chapter_id") || "",
      };
    }

    function syncUrl({ route = "", titleId = "", chapterId = "" } = {}, replace = false) {
      const url = new URL(window.location.href);
      const params = url.searchParams;
      ["route", "title_id", "chapter_id"].forEach((key) => params.delete(key));
      if (route) params.set("route", route);
      if (titleId) params.set("title_id", titleId);
      if (chapterId) params.set("chapter_id", chapterId);
      const finalUrl = `${url.pathname}?${params.toString()}`;
      if (replace) history.replaceState({ route, titleId, chapterId }, "", finalUrl);
      else history.pushState({ route, titleId, chapterId }, "", finalUrl);
    }

    function renderActionButton(button, config) {
      if (!config) {
        button.classList.add("hidden");
        button.onclick = null;
        button.innerHTML = "";
        return;
      }
      button.classList.remove("hidden");
      button.innerHTML = ICONS[config.icon] || "";
      button.setAttribute("aria-label", config.label || "Ação");
      button.title = config.label || "";
      button.onclick = config.onClick || null;
    }

    function updateHeader(pageName) {
      const header = $$("appHeader");
      const bottomNav = $$("bottomNav");
      const meta = HEADER_META[pageName];
      const tabPage = TAB_PAGES.has(pageName);
      header.classList.toggle("hidden", !tabPage);
      bottomNav.classList.toggle("hidden", !tabPage);
      if (!tabPage || !meta) return;

      $$("headerKicker").textContent = meta.kicker;
      $$("headerTitle").textContent = meta.title;
      $$("backBtn").classList.add("hidden");

      const primary = $$("headerActionPrimary");
      const secondary = $$("headerActionSecondary");

      const refreshConfig = {
        icon: "refresh",
        label: "Atualizar",
        onClick: async () => {
          await refreshCurrentTab();
        },
      };

      const searchConfig = {
        icon: "search",
        label: "Buscar no catálogo",
        onClick: async () => {
          if (state.currentPage !== "explore") {
            await openTab("explore");
          }
          requestAnimationFrame(() => $$("exploreSearchInput")?.focus());
        },
      };

      if (pageName === "library") {
        renderActionButton(primary, searchConfig);
        renderActionButton(secondary, refreshConfig);
      } else if (pageName === "updates") {
        renderActionButton(primary, refreshConfig);
        renderActionButton(secondary, null);
      } else if (pageName === "explore") {
        renderActionButton(primary, searchConfig);
        renderActionButton(secondary, refreshConfig);
      } else if (pageName === "history") {
        renderActionButton(primary, refreshConfig);
        renderActionButton(secondary, null);
      } else {
        renderActionButton(primary, null);
        renderActionButton(secondary, null);
      }
    }

    function setPage(pageName) {
      state.currentPage = pageName;
      Object.entries(PAGES).forEach(([name, node]) => {
        node.classList.toggle("hidden", name !== pageName);
      });
      document.querySelectorAll(".nav-item").forEach((button) => {
        button.classList.toggle("active", button.dataset.page === pageName);
      });
      updateHeader(pageName);
      updateUpdateBadge();
      window.scrollTo(0, 0);
    }

    function refreshFavoriteButtons(titleId) {
      const id = String(titleId || "");
      const active = isFav(id);
      document.querySelectorAll(`[data-fav-id="${cssEscape(id)}"]`).forEach((button) => {
        button.classList.toggle("active", active);
      });
      document.querySelectorAll(`[data-detail-fav="${cssEscape(id)}"]`).forEach((detailFav) => {
        detailFav.classList.toggle("active", active);
        const label = detailFav.querySelector("[data-detail-label]");
        if (label) label.textContent = active ? "Na Biblioteca" : "Adicionar à Biblioteca";
      });
    }

    function onFavoritesChanged() {
      renderLibraryPage();
      renderUpdatesPage();
      renderProfilePage();
      if (state.currentPage === "explore") {
        renderExplorePage();
      }
      updateUpdateBadge();
    }

    function onProgressChanged() {
      if (state.currentPage === "history") renderHistoryPage();
      if (state.currentPage === "profile") renderProfilePage();
      if (state.currentPage === "library") renderLibraryPage();
    }

    function toggleFav(titleId, meta = {}) {
      const id = String(titleId || "").trim();
      if (!id) return false;
      if (isFav(id)) {
        delete state.favorites[id];
      } else {
        state.favorites[id] = {
          title_id: id,
          title: meta.display_title || meta.title || meta.title_name || "Mangá",
          display_title: meta.display_title || meta.title || meta.title_name || "Mangá",
          cover_url: meta.cover_url || "",
          background_url: meta.background_url || meta.cover_url || "",
          latest_chapter: meta.latest_chapter || meta.chapter_number || "",
          status: meta.status || "",
          added_at: Date.now(),
        };
      }
      saveFavorites();
      refreshFavoriteButtons(id);
      onFavoritesChanged();
      return isFav(id);
    }

    function getUpdateFeed() {
      const favorites = new Set(getFavList().map((item) => item.title_id));
      return (state.cache.recentChapters || [])
        .map(toTitleItem)
        .filter((item) => favorites.has(item.title_id));
    }

    function updateUpdateBadge() {
      const badge = $$("updatesBadge");
      const count = getUpdateFeed().length;
      badge.textContent = count > 99 ? "99+" : String(count);
      badge.classList.toggle("hidden", count === 0);
    }

    function buildPosterCard(item, options = {}) {
      const data = toTitleItem(item);
      const article = document.createElement("article");
      const progress = getProgress(data.title_id);
      const progressValue = progress?.total_pages
        ? Math.max(4, Math.min(100, Math.round((Number(progress.page_index || 0) / Number(progress.total_pages || 1)) * 100)))
        : 0;
      const badge = options.badgeText || data.chapter_number || data.latest_chapter || "";

      article.className = "poster-card";
      article.innerHTML = `
        <div class="poster-thumb">
          ${data.cover_url ? `<img src="${esc(data.cover_url)}" alt="${esc(data.title)}" loading="lazy" decoding="async" />` : ""}
        </div>
        ${badge ? `<div class="poster-badge">${esc(String(badge).replace(/^Cap(ítulo)?\s*/i, "").trim() || badge)}</div>` : ""}
        <button class="poster-heart ${isFav(data.title_id) ? "active" : ""}" data-fav-id="${esc(data.title_id)}" aria-label="Favoritar">${ICONS.heart}</button>
        ${options.showProgress && progressValue ? `<div class="poster-progress"><span style="width:${progressValue}%"></span></div>` : ""}
        <div class="poster-overlay">
          <div class="poster-title">${esc(data.title)}</div>
          <div class="poster-meta">${esc(options.metaText || [data.status, badge ? `Cap. ${badge}` : ""].filter(Boolean).join(" • ") || "Toque para abrir")}</div>
        </div>
      `;

      article.querySelector(".poster-heart").addEventListener("click", (event) => {
        event.stopPropagation();
        const added = toggleFav(data.title_id, data);
        toast(added ? "Adicionado aos favoritos." : "Removido dos favoritos.");
      });

      article.addEventListener("click", () => openTitle(data.title_id));
      return article;
    }

    function renderPosterGrid(targetId, items = [], options = {}) {
      const target = $$(targetId);
      if (!target) return;
      if (!items.length) {
        target.innerHTML = emptyState(
          options.emptyTitle || "Nada por aqui",
          options.emptyText || "Ainda não há obras para mostrar nesta seção."
        );
        return;
      }

      const grid = document.createElement("div");
      grid.className = "collection-grid";
      items.forEach((item) => {
        grid.appendChild(buildPosterCard(item, options));
      });
      target.innerHTML = "";
      target.appendChild(grid);
    }

    function buildMiniCard(item) {
      const data = toTitleItem(item);
      const article = document.createElement("article");
      article.className = "mini-card";
      article.innerHTML = `
        <div class="mini-thumb">
          ${data.cover_url ? `<img src="${esc(data.cover_url)}" alt="${esc(data.title)}" loading="lazy" decoding="async" />` : ""}
        </div>
        <div class="mini-copy">
          <div class="mini-title">${esc(data.title)}</div>
          <div class="mini-subtitle">${esc(chapterLabel(data))}</div>
        </div>
      `;
      article.addEventListener("click", () => openTitle(data.title_id));
      return article;
    }

    function buildListCard(item, mode = "updates") {
      const data = toTitleItem(item);
      const cover = data.cover_url || getFallbackCover(data.title_id);
      const article = document.createElement("article");
      article.className = "list-card";

      let subtitle = chapterLabel(data);
      let meta = [formatTimeAgo(data.updated_at)];
      let actionLabel = "Abrir";
      let openHandler = () => openTitle(data.title_id);

      if (mode === "updates") {
        actionLabel = data.chapter_id ? "Ler agora" : "Abrir";
        openHandler = () => (data.chapter_id ? openChapter(data.chapter_id) : openTitle(data.title_id));
        meta.unshift(data.status || "Favorito");
      }

      if (mode === "history") {
        const progress = getProgress(data.title_id);
        if (progress?.page_index && progress?.total_pages) {
          meta.unshift(`Página ${progress.page_index}/${progress.total_pages}`);
        }
        actionLabel = data.chapter_id ? "Continuar" : "Abrir";
        openHandler = () => (data.chapter_id ? openChapter(data.chapter_id) : openTitle(data.title_id));
      }

      article.innerHTML = `
        <div class="list-thumb">
          ${cover ? `<img src="${esc(cover)}" alt="${esc(data.title)}" loading="lazy" decoding="async" />` : ""}
        </div>
        <div class="list-main">
          <div class="list-title">${esc(data.title)}</div>
          <div class="list-line">${esc(subtitle)}</div>
          <div class="list-meta">
            ${meta.filter(Boolean).map((value) => `<span class="meta-pill">${esc(value)}</span>`).join("")}
          </div>
        </div>
        <button class="list-action">${esc(actionLabel)}</button>
      `;

      article.addEventListener("click", openHandler);
      article.querySelector(".list-action").addEventListener("click", (event) => {
        event.stopPropagation();
        openHandler();
      });
      return article;
    }

    async function loadHome(force = false) {
      if (state.cache.home && !force) return state.cache.home;
      const data = await api("/api/home");
      state.cache.home = data;
      return data;
    }

    async function loadExploreCatalog(force = false) {
      if (state.cache.explore && !force) return state.cache.explore;
      try {
        const data = await api("/api/explore?limit=160");
        state.cache.explore = dedupeByTitle(data.items || []);
      } catch (_) {
        const home = await loadHome();
        state.cache.explore = dedupeByTitle([
          ...(home?.featured || []),
          ...(home?.popular || []),
          ...(home?.recent_titles || []),
          ...(home?.latest_titles || []),
          ...(home?.recent_chapters || []),
        ]);
      }
      return state.cache.explore;
    }

    async function loadRecentChapters(force = false) {
      if (state.cache.recentChapters && !force) return state.cache.recentChapters;
      try {
        const data = await api("/api/recent-chapters?limit=120");
        state.cache.recentChapters = dedupeByTitle(data.items || []);
      } catch (_) {
        const home = await loadHome();
        state.cache.recentChapters = dedupeByTitle(home?.recent_chapters || []);
      }
      return state.cache.recentChapters;
    }

    async function loadHistory(force = false) {
      if (state.cache.history && !force) return state.cache.history;
      if (!state.userId) {
        state.cache.history = getLocalHistoryItems();
        return state.cache.history;
      }

      try {
        const payload = await api(`/api/history?user_id=${encodeURIComponent(state.userId)}&limit=40`);
        state.cache.history = (payload.items || []).map((item) => ({
          ...item,
          title: item.title || item.title_name || "Mangá",
          cover_url: item.cover_url || getFallbackCover(item.title_id),
          page_index: getProgress(item.title_id)?.page_index || 0,
          total_pages: getProgress(item.title_id)?.total_pages || 0,
        }));
      } catch (_) {
        state.cache.history = getLocalHistoryItems();
      }
      return state.cache.history;
    }

    async function refreshCurrentTab() {
      const page = state.currentPage;
      showLoading("Atualizando", "Recarregando os dados da aba atual.");
      try {
        if (page === "library") {
          await Promise.all([loadHome(true), loadExploreCatalog(true), loadRecentChapters(true)]);
          renderLibraryPage();
        } else if (page === "updates") {
          await loadRecentChapters(true);
          renderUpdatesPage();
        } else if (page === "explore") {
          await Promise.all([loadHome(true), loadExploreCatalog(true)]);
          if (state.exploreQuery.trim()) {
            await runExploreSearch(state.exploreQuery.trim(), true);
          } else {
            renderExplorePage();
          }
        } else if (page === "history") {
          await loadHistory(true);
          renderHistoryPage();
        } else if (page === "profile") {
          await loadHistory(true);
          renderProfilePage();
        }
      } catch (error) {
        toast(error?.message || "Não consegui atualizar agora.");
      } finally {
        hideLoading();
      }
    }

    function getExploreSourceItems() {
      if (state.exploreQuery.trim()) return state.exploreResults;
      if (state.exploreFilter === "favorites") return getFavList();
      if (state.exploreFilter === "popular") return (state.cache.home?.popular || []).map(toTitleItem);
      if (state.exploreFilter === "recent") return (state.cache.home?.recent_titles || []).map(toTitleItem);
      if (state.exploreFilter === "latest") return (state.cache.home?.latest_titles || []).map(toTitleItem);
      return state.cache.explore || [];

                      : `${items.length} obra(s) disponíveis em PT-BR neste catálogo.`

      const searchInput = $$("exploreSearchInput");
      let searchTimer;
      searchInput.addEventListener("input", () => {
        const nextQuery = searchInput.value;
        state.exploreQuery = nextQuery;
        clearTimeout(searchTimer);
        if (!nextQuery.trim()) {
          state.exploreResults = [];
          state.exploreSearching = false;
          renderExplorePage();
          return;
        }
        searchTimer = setTimeout(() => runExploreSearch(nextQuery.trim()), 300);
      });
      searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          runExploreSearch(searchInput.value.trim());
        }
      });

      page.querySelectorAll("[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          state.exploreFilter = button.dataset.filter || "all";
          renderExplorePage();
        });
      });

    async function runExploreSearch(query, keepLoading = false) {
      const text = String(query || "").trim();
      state.exploreQuery = text;
      if (!text) {
        state.exploreResults = [];
        state.exploreSearching = false;
        renderExplorePage();
        return;
      }

      const key = text.toLowerCase();
      state.exploreSearching = true;
      renderExplorePage();

      if (state.inflight.search.has(key) && !keepLoading) {
        return state.inflight.search.get(key);
      }

      const task = (async () => {
        try {
          let data = state.cache.search.get(key);
          if (!data || keepLoading) {
            data = await api(`/api/search?q=${encodeURIComponent(text)}&limit=24`);
            state.cache.search.set(key, data);
          }
          if (state.exploreQuery.trim().toLowerCase() === key) {
            state.exploreResults = dedupeByTitle(data.results || []);
          }
        } catch (_) {
          if (state.exploreQuery.trim().toLowerCase() === key) {
            state.exploreResults = [];
            toast("A busca falhou agora.");
          }
        } finally {
          if (state.exploreQuery.trim().toLowerCase() === key) {
            state.exploreSearching = false;
            renderExplorePage();
          }
          state.inflight.search.delete(key);
        }
      })();

      state.inflight.search.set(key, task);
      return task;
    }

    function buildMetaPills(bundle, chapters = []) {
      const pills = [];

      if (total) pills.push(`${total} caps`);
      pills.push("PT-BR");
      return pills;

    function extractChapterNum(chapter) {
      const raw = String(chapter.chapter_number || chapter.number || "0");
      const match = raw.match(/[\d]+(?:[.,]\d+)?/);
      return match ? parseFloat(match[0].replace(",", ".")) : 0;
    }

    function sortChapters(chapters) {
      return [...chapters].sort((a, b) => extractChapterNum(b) - extractChapterNum(a));
    }

    function attachReaderObserver(payload) {
      state.chapterObserver?.disconnect();
      const images = [...document.querySelectorAll(".reader-page-card img")];
      if (!images.length) return;

      let lastSaved = -1;
      state.chapterObserver = new IntersectionObserver((entries) => {
        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;

        const index = Number(visible.target.dataset.index || "0");
        if (!index || index === lastSaved) return;
        lastSaved = index;

        const cachedTitle = state.cache.titles.get(payload.title_id);
        const cover = cachedTitle?.cover_url || getFallbackCover(payload.title_id) || "";

        persistProgress({
          title_id: payload.title_id,
          title_name: payload.title,
          chapter_id: payload.chapter_id,
          chapter_number: payload.chapter_number,
          page_index: index,
          total_pages: images.length,
          cover_url: cover,
        }).catch(() => {});
      }, { threshold: [0.4, 0.65, 0.9] });

      images.forEach((image) => state.chapterObserver.observe(image));
    }

    async function persistProgress(payload) {
      if (!payload?.title_id) return;
      setProgress(payload);
      onProgressChanged();

      if (!state.userId) return;
      try {
        await api("/api/progress", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id: state.userId,
            title_id: payload.title_id,
            title_name: payload.title_name || "",
            chapter_id: payload.chapter_id || "",
            chapter_number: payload.chapter_number || "",
            chapter_url: "",
            page_index: Number(payload.page_index || 0),
            total_pages: Number(payload.total_pages || 0),
          }),
        });
        state.cache.history = null;
      } catch (_) {}
    }

    async function openTitle(titleId, force = false, options = {}) {
      if (!titleId) return;
      const id = String(titleId);
      if (TAB_PAGES.has(state.currentPage)) {
        state.lastTab = state.currentPage;
      }
      if (!force && state.inflight.titles.has(id)) {
        return state.inflight.titles.get(id);
      }

      const task = (async () => {
        showLoading("Abrindo obra", "Buscando capa, sinopse e capítulos.");
        try {
          let bundle = state.cache.titles.get(id);
          if (!bundle || force) {
            bundle = await api(`/api/title/${encodeURIComponent(id)}?lang=pt-br${state.userId ? `&user_id=${encodeURIComponent(state.userId)}` : ""}`);
            const local = getProgress(id);
            if (local && !bundle.last_read) {
              bundle.last_read = {
                title_id: local.title_id,
                title_name: local.title_name || "",
                chapter_id: local.chapter_id || "",
                chapter_number: local.chapter_number || "",
              };
            }
            state.cache.titles.set(id, bundle);
          }
          state.chapterFilter = "";
          state.chapterOrder = "desc";
          renderDetail(bundle, {
            route: options.route || "detail",
            replaceHistory: Boolean(options.replaceHistory),
          });
        } catch (error) {
          toast(error?.message || "Não consegui abrir esta obra agora.");
        } finally {
          state.inflight.titles.delete(id);
          hideLoading();
        }
      })();

      state.inflight.titles.set(id, task);
      return task;
    }

    async function openChapter(chapterId, force = false, options = {}) {
      if (!chapterId) return;
      const id = String(chapterId);
      if (!force && state.inflight.chapters.has(id)) {
        return state.inflight.chapters.get(id);
      }

      const task = (async () => {
        showLoading("Abrindo capítulo", "Preparando as páginas para leitura.");
        try {
          let payload = state.cache.chapters.get(id);
          if (!payload || force) {
            payload = await api(`/api/chapter/${encodeURIComponent(id)}`);
            state.cache.chapters.set(id, payload);
          }

          const titleBundle = state.cache.titles.get(payload.title_id);
          const cover = titleBundle?.cover_url || getFallbackCover(payload.title_id) || "";

          await persistProgress({
            title_id: payload.title_id,
            title_name: payload.title,
            chapter_id: payload.chapter_id,
            chapter_number: payload.chapter_number,
            page_index: 1,
            total_pages: payload.images?.length || 0,
            cover_url: cover,
          });

          renderReader(payload, { replaceHistory: Boolean(options.replaceHistory) });
        } catch (error) {
          toast(error?.message || "Não consegui abrir este capítulo agora.");
        } finally {
          state.inflight.chapters.delete(id);
          hideLoading();
        }
      })();

      state.inflight.chapters.set(id, task);
      return task;
    }

    async function openTab(pageName, options = {}) {
      if (!TAB_PAGES.has(pageName)) return;

      if (pageName === "updates") {
        await loadRecentChapters();
        renderUpdatesPage();
      } else if (pageName === "explore") {
        await Promise.all([loadHome(), loadExploreCatalog()]);
        renderExplorePage();
      } else if (pageName === "history") {
        await loadHistory();
        renderHistoryPage();
      } else if (pageName === "profile") {
        await loadHistory();
        renderProfilePage();
      } else {
        renderLibraryPage();
      }

      setPage(pageName);
      syncUrl({ route: pageName }, Boolean(options.replaceHistory));
    }

    async function boot() {
      showLoading("Preparando miniapp", "Organizando biblioteca, catálogo e histórico.");
      try {
        await Promise.allSettled([
          loadHome(),
          loadExploreCatalog(),
          loadRecentChapters(),
          loadHistory(),
        ]);

        renderLibraryPage();
        renderUpdatesPage();
        renderExplorePage();
        renderHistoryPage();
        renderProfilePage();

        const bootParams = getBootParams();
        if (bootParams.chapterId) {
          await openChapter(bootParams.chapterId, false, { replaceHistory: true });
          return;
        }
        if (bootParams.titleId) {
          await openTitle(bootParams.titleId, false, { replaceHistory: true, route: bootParams.route || "detail" });
          return;
        }
        const route = TAB_PAGES.has(bootParams.route) ? bootParams.route : "library";
        await openTab(route, { replaceHistory: true });
      } finally {
        hideLoading();
      }
    }

    document.querySelectorAll(".nav-item").forEach((button) => {
      button.addEventListener("click", () => {
        openTab(button.dataset.page);
      });
    });

    $$("backBtn").addEventListener("click", () => {
      if (state.currentPage === "detail") {
        openTab(state.lastTab || "library");
      } else if (state.currentPage === "reader" && state.currentTitleId) {
        openTitle(state.currentTitleId, false, { route: "detail" });
      }
    });

    window.addEventListener("popstate", async () => {
      const bootParams = getBootParams();
      if (bootParams.chapterId) {
        await openChapter(bootParams.chapterId, false, { replaceHistory: true });
        return;
      }
      if (bootParams.titleId) {
        await openTitle(bootParams.titleId, false, { replaceHistory: true, route: bootParams.route || "detail" });
        return;
      }
      await openTab(TAB_PAGES.has(bootParams.route) ? bootParams.route : "library", { replaceHistory: true });
    });

    boot();
  </script>
</body>
</html>
